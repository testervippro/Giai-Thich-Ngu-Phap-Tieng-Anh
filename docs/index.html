<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Giải thích ngữ pháp tiếng anh</title>

  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Grammar Book">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
/* nền ảnh giữ nguyên */
body {
  background-image: url('cover.png');
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  background-color: #e5e5e5;
}

/* giảm độ trắng overlay → thấy ảnh rõ hơn */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.4); /* 👈 giảm từ 0.7 → 0.4 */
  z-index: -1;
}

/* nền content rõ hơn */
.markdown-section {
  background: rgba(255,255,255,0.9); /* 👈 tăng contrast */
  padding: 24px;
  border-radius: 12px;
}

/* tiêu đề đậm hơn */
.markdown-section h1,
.markdown-section h2 {
  color: #111827;
  font-weight: 700;
}

/* link rõ hơn (fix màu xanh nhạt) */
.markdown-section a {
  color: #059669; /* xanh đậm hơn */
  font-weight: 600;
}

.markdown-section a:hover {
  color: #047857;
}

/* sidebar rõ hơn */
.sidebar {
  background: rgba(255,255,255,0.95);
}

/* text sidebar */
.sidebar a {
  color: #374151;
}

.sidebar a:hover {
  color: #059669;
}
</style>
</head>

<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: '📚Giải thích ngữ pháp tiếng anh',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0,
      maxLevel: 0 
    }
  </script>

  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
